<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .selection-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid theme('colors.border-slate');
            background: theme('colors.surface-container-lowest');
        }
        
        .selection-card:hover {
            border-color: theme('colors.outline-variant');
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        
        .selection-card.active {
            border: 2px solid theme('colors.primary');
            background: theme('colors.accent-soft');
            transform: translateY(-2px);
        }
        
        .radio-indicator {
            transition: all 0.2s ease-in-out;
            border: 2px solid theme('colors.outline-variant');
        }
        
        .selection-card.active .radio-indicator {
            border-color: theme('colors.primary');
            background-color: theme('colors.primary');
            position: relative;
        }
        
        .selection-card.active .radio-indicator::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: white;
        }

        .icon-container {
            transition: all 0.3s ease;
        }

        .selection-card.active .icon-container {
            color: theme('colors.primary');
        }
    </style>
</head>
<body class="bg-ink-navy text-on-surface antialiased min-h-screen flex items-center justify-center p-4 md:p-8">
<!-- Shell Wrapper -->
<div class="w-full max-w-[1440px] mx-auto min-h-[921px] bg-surface rounded-2xl shadow-2xl overflow-hidden relative flex flex-col border border-border-slate">
<!-- TopAppBar (Wizard Context) -->
<header class="bg-surface/80 backdrop-blur-md border-b border-border-slate flex justify-between items-center px-lg py-md z-50 shadow-xs relative">
<div class="font-headline-md text-headline-md font-extrabold tracking-tight text-primary">AlysTech</div>
<!-- Progress Indicator -->
<div class="hidden md:flex items-center gap-sm">
<div class="h-2 w-12 rounded-full bg-border-slate"></div>
<div class="h-2 w-12 rounded-full bg-primary shadow-sm shadow-primary/20"></div>
<div class="h-2 w-12 rounded-full bg-border-slate"></div>
<div class="h-2 w-12 rounded-full bg-border-slate"></div>
</div>
<button class="text-ink-muted hover:bg-accent-soft p-2 rounded-full transition-colors hidden md:flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center w-full max-w-[1024px] mx-auto py-16 px-4 md:px-8">
<div class="w-full max-w-3xl flex flex-col gap-xl">
<!-- Question Header -->
<div class="text-center md:text-left mb-4">
<span class="font-label-caps text-label-caps text-ink-muted uppercase tracking-widest block mb-2">Step 2 of 4</span>
<h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-on-surface mb-2">¿En qué servicio estás interesado?</h1>
<p class="font-body-base text-body-base text-secondary">Selecciona la opción que mejor describa tus necesidades actuales.</p>
</div>
<!-- Bento Grid Selection Options -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full" id="service-options">
<!-- Option 1: Software -->
<label class="selection-card rounded-xl p-6 cursor-pointer flex flex-col items-start gap-4 relative">
<input class="hidden" name="service" type="radio" value="software"/>
<div class="flex justify-between items-start w-full">
<div class="icon-container w-12 h-12 rounded-lg bg-surface-container-high flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-3xl" data-icon="code">code</span>
</div>
<div class="radio-indicator w-[22px] h-[22px] rounded-full"></div>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-on-surface text-xl mb-1">Software</h3>
<p class="font-body-medium text-body-medium text-secondary">Desarrollo web, aplicaciones móviles y soluciones a medida.</p>
</div>
</label>
<!-- Option 2: Hardware -->

<input class="hidden" name="service" type="radio" value="hardware"/>
<div class="flex justify-between items-start w-full">
<div class="icon-container w-12 h-12 rounded-lg bg-surface-container-high flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-3xl" data-icon="developer_board">developer_board</span>
</div>
<div class="radio-indicator w-[22px] h-[22px] rounded-full"></div>
</div>

<p class="font-body-medium text-body-medium text-secondary">Infraestructura de servidores, redes y equipos físicos.</p>
</div>
</label>
<!-- Option 3: Consulting -->

<input class="hidden" name="service" type="radio" value="consulting"/>
<div class="flex justify-between items-start w-full">
<div class="icon-container w-12 h-12 rounded-lg bg-surface-container-high flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-3xl" data-icon="support_agent">support_agent</span>
</div>

<span class="material-symbols-outlined mr-2 text-[18px]" data-icon="arrow_back">arrow_back</span>
                    Back
                </button>
<button class="flex items-center justify-center bg-primary text-on-primary rounded-xl px-xl py-md font-bold shadow-lg shadow-accent-soft/25 hover:scale-[1.02] transition-transform font-label-caps text-label-caps uppercase h-11 min-w-[120px]">
                    Continue
                    <span class="material-symbols-outlined ml-2 text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</nav>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.selection-card');
            
            cards.forEach(card => {
                card.addEventListener('click', () => {
                    // Remove active class from all
                    cards.forEach(c => c.classList.remove('active'));
                    // Add active class to clicked
                    card.classList.add('active');
                    // Ensure the radio input is checked (though standard behavior usually handles this on label click)
                    const radio = card.querySelector('input[type="radio"]');
                    if(radio) radio.checked = true;
                });
            });
        });
    </script>
</body></html>
