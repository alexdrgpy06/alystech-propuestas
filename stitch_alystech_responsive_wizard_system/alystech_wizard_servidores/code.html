<body class="bg-background text-on-background antialiased min-h-screen flex flex-col items-center">

<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-max-width-content px-margin-mobile md:px-margin-desktop mt-32 mb-40 flex-grow">
<!-- Header Section -->
<div class="mb-12 text-center max-w-3xl mx-auto">
<span class="inline-block px-3 py-1 mb-4 rounded-full bg-surface-container-high text-on-surface-variant font-label-caps text-label-caps uppercase tracking-wider">Paso 4 de 13 • Bloque B.1</span>
<h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-ink-navy mb-4">Infraestructura de Servidores</h1>
<p class="font-body-base text-body-base text-ink-secondary">Potencia el núcleo de tu operación. Selecciona la opción que mejor se adapte a tus necesidades de rendimiento, escalabilidad y presupuesto.</p>
</div>
<!-- Selection Grid -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
<!-- Option 1: Rack Reacondicionado -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="server_option" type="radio" value="rack"/>
<div class="h-full flex flex-col p-6 rounded-2xl bg-surface-container-lowest border border-border-slate hover:border-primary-fixed peer-checked:border-2 peer-checked:border-primary peer-checked:bg-accent-soft transition-all duration-200 shadow-sm hover:shadow-md">
<div class="flex justify-between items-start mb-6">
<div class="p-3 bg-surface-container rounded-xl text-secondary group-hover:text-primary peer-checked:bg-primary peer-checked:text-on-primary transition-colors">
<span class="material-symbols-outlined text-[32px]">dns</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-border-slate peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center transition-colors">
<div class="w-2 h-2 rounded-full bg-surface-container-lowest opacity-0 peer-checked:opacity-100 transition-opacity"></div>
</div>
</div>
<div class="mb-4">
<span class="inline-block px-2 py-1 bg-success/20 text-success font-label-caps text-label-caps rounded mb-2">Eficiencia</span>
<h3 class="font-headline-md text-headline-md text-ink-navy mb-2">Rack Reacondicionado</h3>
<p class="font-body-medium text-body-medium text-ink-secondary">Servidores empresariales de grado data center con componentes verificados. Ideal para maximizar el retorno de inversión sin comprometer el rendimiento base.</p>
</div>
</div>
</label>
<!-- Option 2: Torre Nuevo Dell -->
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" name="server_option" type="radio" value="tower"/>
<div class="h-full flex flex-col p-6 rounded-2xl bg-surface-container-lowest border border-border-slate hover:border-primary-fixed peer-checked:border-2 peer-checked:border-primary peer-checked:bg-accent-soft transition-all duration-200 shadow-sm hover:shadow-md">
<div class="flex justify-between items-start mb-6">
<div class="p-3 bg-surface-container rounded-xl text-secondary group-hover:text-primary peer-checked:bg-primary peer-checked:text-on-primary transition-colors">
<span class="material-symbols-outlined text-[32px]">computer</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-border-slate peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center transition-colors">
<div class="w-2 h-2 rounded-full bg-surface-container-lowest opacity-0 peer-checked:opacity-100 transition-opacity"></div>
</div>
</div>
<div class="mb-4">
<span class="inline-block px-2 py-1 bg-primary/20 text-primary font-label-caps text-label-caps rounded mb-2">Robustez</span>
<h3 class="font-headline-md text-headline-md text-ink-navy mb-2">Torre Nuevo Dell</h3>
<p class="font-body-medium text-body-medium text-ink-secondary">Equipamiento de última generación con garantía de fábrica. Diseñado para oficinas sin infraestructura de rack dedicada, ofreciendo un funcionamiento silencioso y potente.</p>
</div>
</div>
</label>
<!-- Option 3: HA Cluster -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="server_option" type="radio" value="cluster"/>
<div class="h-full flex flex-col p-6 rounded-2xl bg-surface-container-lowest border border-border-slate hover:border-primary-fixed peer-checked:border-2 peer-checked:border-primary peer-checked:bg-accent-soft transition-all duration-200 shadow-sm hover:shadow-md">
<div class="flex justify-between items-start mb-6">
<div class="p-3 bg-surface-container rounded-xl text-secondary group-hover:text-primary peer-checked:bg-primary peer-checked:text-on-primary transition-colors">
<span class="material-symbols-outlined text-[32px]">hub</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-border-slate peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center transition-colors">
<div class="w-2 h-2 rounded-full bg-surface-container-lowest opacity-0 peer-checked:opacity-100 transition-opacity"></div>
</div>
</div>
<div class="mb-4">
<span class="inline-block px-2 py-1 bg-warning/20 text-warning font-label-caps text-label-caps rounded mb-2">Alta Disponibilidad</span>
<h3 class="font-headline-md text-headline-md text-ink-navy mb-2">HA Cluster</h3>
<p class="font-body-medium text-body-medium text-ink-secondary">Arquitectura redundante con balanceo de carga automático. Garantiza la continuidad del negocio mitigando puntos únicos de falla. Ideal para operaciones críticas 24/7.</p>
</div>
</div>
</label>
