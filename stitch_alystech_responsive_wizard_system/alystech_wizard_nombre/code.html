<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AlysTech - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",

                extend: {

                        "success": "#16a34a",

                        "on-secondary-container": "#5c647a",

                        "surface-bright": "#f7f9fb",
                        "outline": "#737686",
                        "surface-container-low": "#f2f4f6",
                        "on-primary-fixed-variant": "#003ea8",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#e6e8ea",
                        "surface-dim": "#d8dadc",
                        "primary-fixed-dim": "#b4c5ff",
                        "primary-fixed": "#dbe1ff",
                        "border-slate": "#e2e8f0",
                        "secondary-fixed-dim": "#bec6e0",
                        "surface-tint": "#0053db",
                        "primary": "#004ac6",
                        "tertiary": "#4b566a",
                        "warning": "#d97706",
                        "on-error": "#ffffff",
                        "danger": "#dc2626",
                        "on-background": "#191c1e",
                        "error-container": "#ffdad6",
                        "inverse-primary": "#b4c5ff",
                        "inverse-on-surface": "#eff1f3",
                        "ink-secondary": "#475569",
                        "on-secondary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed": "#111c2d",
                        "surface-container-highest": "#e0e3e5",
                        "on-tertiary-fixed-variant": "#3c475a",
                        "surface-variant": "#e0e3e5",
                        "on-tertiary-container": "#ecf1ff",
                        "on-error-container": "#93000a",
                        "accent-soft": "#eff6ff",
                        "secondary-container": "#dae2fd",
                        "primary-container": "#2563eb",
                        "tertiary-container": "#636e83",
                        "on-secondary-fixed": "#131b2e",
                        "on-primary-fixed": "#00174b",
                        "on-surface-variant": "#434655",
                        "on-primary-container": "#eeefff",
                        "secondary": "#565e74",
                        "tertiary-fixed-dim": "#bcc7de",
                        "background": "#f7f9fb",
                        "ink-navy": "#0d1f3c",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#d8e3fb",
                        "outline-variant": "#c3c6d7",
                        "on-secondary-fixed-variant": "#3f465c",
                        "inverse-surface": "#2d3133",
                        "surface-container": "#eceef0",
                        "on-surface": "#191c1e",
                        "secondary-fixed": "#dae2fd",
                        "surface": "#f7f9fb"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "32px",
                        "sm": "8px",
                        "lg": "24px",
                        "md": "16px",
                        "max-width-content": "1024px",
                        "margin-mobile": "16px",
                        "unit": "4px",
                        "margin-desktop": "40px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "body-medium": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],

                    },
                    "fontSize": {

                        "display-lg": ["36px", { "lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "body-base": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "display-lg-mobile": ["30px", { "lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "label-caps": ["11px", { "lineHeight": "16px", "letterSpacing": "0.15em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "800" }]

                }
            }
        }
    </script>
<style>
        /* Fluid Light Background Animation */
        @keyframes meshGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .bg-fluid-mesh {
            background: linear-gradient(120deg, #f7f9fb 0%, #eff6ff 50%, #f7f9fb 100%);
            background-size: 200% 200%;
            animation: meshGlow 12s ease-in-out infinite;
        }

        /* Entrance Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up {
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
    </style>
</head>
<body class="bg-fluid-mesh min-h-screen flex flex-col font-body-base text-body-base text-on-surface antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Header / Progress Indicator -->
<!-- NOTE: Navigation shell is suppressed per rules for linear onboarding tasks -->
<header class="w-full px-margin-mobile md:px-margin-desktop py-xl flex justify-between items-center max-w-max-width-content mx-auto z-10">
<div class="font-headline-md text-headline-md font-extrabold tracking-tight text-primary">
            AlysTech
        </div>
<!-- Segmented Progress Bar -->
<div aria-label="Progreso del formulario" class="flex items-center gap-unit">
<div class="w-8 md:w-12 h-1.5 rounded-full bg-primary shadow-sm shadow-primary/20"></div>
<div class="w-8 md:w-12 h-1.5 rounded-full bg-surface-dim"></div>
<div class="w-8 md:w-12 h-1.5 rounded-full bg-surface-dim"></div>
<div class="w-8 md:w-12 h-1.5 rounded-full bg-surface-dim"></div>
</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop w-full max-w-max-width-content mx-auto relative z-10 -mt-xl">
<div class="w-full max-w-2xl flex flex-col items-center">
<!-- Question -->
<label class="font-display-lg-mobile text-display-lg-mobile md:font-display-lg md:text-display-lg text-ink-navy text-center mb-xl opacity-0 animate-fade-up block" for="user-name">
                ¿Cuál es tu nombre?
            </label>
<!-- Input Area -->
<div class="w-full relative group opacity-0 animate-fade-up delay-100">
<input autocomplete="given-name" autofocus="" class="w-full bg-transparent border-0 border-b-2 border-surface-dim text-center font-headline-md text-headline-md text-ink-navy focus:border-primary focus:ring-0 px-md py-lg transition-colors duration-300 placeholder:text-ink-muted/40 outline-none" id="user-name" placeholder="Escribe tu nombre aquí" type="text"/>
<!-- Interactive Focus Line -->
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-0 h-[2px] bg-primary transition-all duration-500 ease-out group-focus-within:w-full group-focus-within:shadow-[0_-4px_16px_rgba(0,74,198,0.15)] pointer-events-none"></div>
</div>
</div>
</main>
<!-- Footer Action -->
<footer class="w-full px-margin-mobile md:px-margin-desktop py-xl flex justify-end md:justify-center items-center max-w-max-width-content mx-auto z-10 opacity-0 animate-fade-up delay-200">
<button class="flex items-center justify-center gap-sm bg-primary text-on-primary rounded-xl px-xl py-md font-bold shadow-lg shadow-accent-soft/25 hover:scale-[1.02] hover:bg-surface-tint transition-all group">
<span class="font-label-caps text-label-caps uppercase">Siguiente</span>
<span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</footer>
<!-- Interactive script for input subtle scaling -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('user-name');
            const wrapper = input.parentElement;

            input.addEventListener('focus', () => {
                wrapper.style.transform = 'scale(1.02)';
                wrapper.style.transition = 'transform 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
            });

            input.addEventListener('blur', () => {
                wrapper.style.transform = 'scale(1)';
            });
        });
    </script>
</body></html>
