<style>
        body {
            background-color: #0f172a; /* Outer shell backdrop */
            color: #191c1e;
        }
        .canvas-container {
            background-color: #ffffff;
            min-height: 100vh;
            margin: 0 auto;
            max-width: 1440px; /* Shell max width */
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        @media (min-width: 768px) {
            .canvas-container {
                margin: 2rem auto;
                min-height: calc(100vh - 4rem);
                border-radius: 1rem;
                overflow: hidden;
                position: relative;
            }
        }
        
        .radio-indicator {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        
        input[type="radio"]:checked + .card-content {
            border-color: #2563eb;
            background-color: #eff6ff;
        }
        
        input[type="radio"]:checked + .card-content .radio-indicator {
            border-color: #2563eb;
            background-color: #2563eb;
        }
        
        input[type="radio"]:checked + .card-content .radio-indicator::after {
            content: '';
            width: 8px;
            height: 8px;
            background-color: white;
            border-radius: 50%;
        }

        .step-progress {
            display: flex;
            gap: 4px;
            justify-content: center;
            margin-bottom: 2rem;
        }
        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #e2e8f0;
        }
        .step-dot.active {
            background-color: #004ac6;
            width: 24px;
            border-radius: 4px;
        }
        .step-dot.completed {
            background-color: #004ac6;
        }
    </style>
